version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.75
skill: rewrite-polisher
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the rewrite-polisher skill to make this draft clearer and more concise."
  - id: rewrite-tone
    should_trigger: true
    prompt: "Rewrite this paragraph so it sounds more professional."
  - id: polish-copy
    should_trigger: true
    prompt: "Polish this draft without changing the core meaning."
  - id: negative-translation
    should_trigger: false
    prompt: "Translate this UI copy into Chinese without sounding machine-translated."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "AGENTS.md"
      - file_exists: "eval.yaml"
      - file_exists: "references/domain.md"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      The skill should:
      - stay scoped to rewriting and polishing,
      - mention clarity, tone, or readability improvements clearly,
      - show realistic rewrite prompts near the top,
      - include portable `{baseDir}` commands,
      - document what happens when the skill is re-run.
