version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.75
skill: summarizer
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the summarizer skill to turn this transcript into an executive summary."
  - id: article-summary
    should_trigger: true
    prompt: "Summarize this article into 5 bullet points."
  - id: meeting-digest
    should_trigger: true
    prompt: "Turn this meeting transcript into a concise executive summary."
  - id: negative-translation
    should_trigger: false
    prompt: "Translate this product copy into English and keep it natural."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "AGENTS.md"
      - file_exists: "eval.yaml"
      - file_exists: "references/domain.md"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      The skill should:
      - stay scoped to summaries and digests,
      - mention summary, digest, abstract, or executive summary clearly,
      - show realistic summary prompts near the top,
      - include portable `{baseDir}` commands,
      - document what happens when the skill is re-run.
