version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.75
skill: copy-translator
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the copy-translator skill to localize this landing page copy into Japanese."
  - id: marketing-translation
    should_trigger: true
    prompt: "Translate this product copy into English and keep it natural."
  - id: ui-localization
    should_trigger: true
    prompt: "Translate this UI copy into Chinese without sounding machine-translated."
  - id: negative-summary
    should_trigger: false
    prompt: "Summarize this long article into 5 bullet points."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "AGENTS.md"
      - file_exists: "eval.yaml"
      - file_exists: "references/domain.md"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      The skill should:
      - stay scoped to translation and localization,
      - mention translation, localization, or tone preservation clearly,
      - show realistic translation prompts near the top,
      - include portable `{baseDir}` commands,
      - document what happens when the skill is re-run.
