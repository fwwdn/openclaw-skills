version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.75
skill: email-writer
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the email-writer skill to draft a polite follow-up email after a demo."
  - id: follow-up-email
    should_trigger: true
    prompt: "Write a polite follow-up email after a sales demo."
  - id: rewrite-email
    should_trigger: true
    prompt: "Rewrite this email so it sounds warmer but still concise."
  - id: negative-blog
    should_trigger: false
    prompt: "Write a blog post about why product teams need better release notes."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/write.js"
      - file_exists: "scripts/models.js"
      - file_exists: "references/domain.md"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      The skill should:
      - stay scoped to email drafting and rewriting,
      - mention follow-up, reply, or outreach email use cases clearly,
      - show realistic email prompts near the top,
      - include portable `{baseDir}` commands,
      - document what happens when the skill is re-run.
